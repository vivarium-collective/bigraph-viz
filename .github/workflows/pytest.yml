name: Run Pytest

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Graphviz (system)
        run: sudo apt-get install -y graphviz

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: |
          uv run pytest --ignore=experiments --ignore=bigraph_viz/test_notebooks.py --cov=bigraph_viz --cov-report=term
